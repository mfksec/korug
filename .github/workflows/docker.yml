name: Build Docker Image

on:
  push:
    branches: [ master, main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: |
        docker build -f docker/Dockerfile -t korug:latest .
        docker run --rm \
          -e DATABASE_URL="sqlite:////tmp/korug.db" \
          -e JWT_SECRET_KEY="ci-jwt-secret-key-0123456789abcdef" \
          -e API_KEY="ci-api-key-0123456789abcdef" \
          -e ALLOWED_ORIGINS="http://localhost:3000,http://localhost:5173" \
          korug:latest python -m korug.cli --help
