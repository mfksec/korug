name: lint

on:
  push:
    branches: [master, "feature/**", "chore/**", "fix/**"]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort

      # Hard gate: real defects only — syntax errors and undefined names. This is
      # the canonical flake8 CI subset; it caught a latent NameError before launch.
      - name: flake8 (critical)
        run: flake8 src/ tests/ --select=E9,F63,F7,F82 --show-source --statistics

      # Advisory (non-blocking until the codebase is fully formatted — tracked as a
      # follow-up). Surfaces style drift without failing the build.
      - name: flake8 (full, advisory)
        continue-on-error: true
        run: flake8 src/ tests/

      - name: black --check (advisory)
        continue-on-error: true
        run: black --check src/ tests/

      - name: isort --check (advisory)
        continue-on-error: true
        run: isort --check-only src/ tests/
