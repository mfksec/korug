version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: subdomain_hunter_db
    environment:
      POSTGRES_DB: subdomain_hunter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - subdomain_hunter_network

  redis:
    image: redis:7-alpine
    container_name: subdomain_hunter_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - subdomain_hunter_network

  subdomain-hunter-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: subdomain_hunter_app
    environment:
      DATABASE_URL: postgresql://postgres:postgres_password@postgres:5432/subdomain_hunter
      FASTAPI_ENV: production
      FASTAPI_DEBUG: "false"
      HOST: 0.0.0.0
      PORT: 8000
      # Security: Set these required variables
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-jwt-secret-key-change-in-production-minimum-32bytes}
      API_KEY: ${API_KEY:-dev-api-key-change-in-production-minimum-32bytes}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000,http://localhost:5174}
      # Redis Configuration: for distributed rate-limiting & token revocation
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # Admin User Seeding: create initial admin on first run
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@subdomain-hunter.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Optional: Configure these with your API keys
      # SHODAN_API_KEY: ${SHODAN_API_KEY}
      # URLSCAN_API_KEY: ${URLSCAN_API_KEY}
      # SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      # SLACK_ENABLED: ${SLACK_ENABLED:-false}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./exports:/app/exports
    command: python -m subdomain_hunter.run
    networks:
      - subdomain_hunter_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  subdomain-hunter-ui:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: subdomain_hunter_ui
    ports:
      - "3000:3000"
    depends_on:
      subdomain-hunter-api:
        condition: service_healthy
    networks:
      - subdomain_hunter_network

volumes:
  postgres_data:
  redis_data:

networks:
  subdomain_hunter_network:
    driver: bridge
